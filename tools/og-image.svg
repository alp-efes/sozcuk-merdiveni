<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <!-- Sosyal paylaşım kartı (1200x630). WhatsApp/Twitter/Facebook önizlemesi.
       tools/ altında tutulur; PNG'ye çevrilip og-image.png olarak köke yazılır. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22222a"/>
      <stop offset="1" stop-color="#111113"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#4a9d4f"/>

  <!-- Sol metin bloğu -->
  <text x="90" y="235" fill="#c9a94a" font-size="34" font-weight="700" letter-spacing="7">SÖZCÜK YOLU</text>
  <text x="88" y="330" fill="#f5f5f7" font-size="96" font-weight="800">Sözcük Merdiveni</text>
  <text x="90" y="405" fill="#c9c9d0" font-size="40" font-weight="500">Türkçe kelime oyunu · Her gün yeni bulmaca</text>
  <text x="90" y="458" fill="#9a9aa0" font-size="30" font-weight="500">Ücretsiz · Üyeliksiz · Mobil uyumlu</text>
  <text x="90" y="565" fill="#c9a94a" font-size="34" font-weight="700">sözcükyolu.com</text>

  <!-- Sağ: yükselen kutu ikonu (favicon ile aynı motif, büyük) -->
  <g transform="translate(902,150)">
    <rect x="150" y="0"   width="100" height="100" rx="20" fill="#c9a94a"/>
    <rect x="75"  y="75"  width="100" height="100" rx="20" fill="#e9e7e0"/>
    <rect x="0"   y="150" width="100" height="100" rx="20" fill="#4a9d4f"/>
  </g>
</svg>
